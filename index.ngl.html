<!DOCTYPE html>

<html lang="en" xmlns="http://www.vercel.com/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>taskflow-project</title>
    <!-- Tailwind via CDN, we rely almost entirely on utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        };
    </script>
</head>

<body class="bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen">
    <!-- Main app container: sidebar + main content + filters panel -->
    <div class="max-w-6xl mx-auto flex gap-6 py-6 px-4">
        <!-- Sidebar toggle button (hamburger) for small screens -->
        <div id="menuToggle" class="fixed top-4 left-4 z-30 cursor-pointer text-3xl text-indigo-500 lg:hidden">
            <span class="menu-icon">&#9776;</span>
        </div>

        <!-- Sidebar navigation: sections (tasks, calendar, notes) -->
        <nav id="sidebar"
             class="fixed inset-y-0 left-0 w-64 bg-indigo-600 text-white transform -translate-x-full transition-transform duration-300 z-40 lg:static lg:translate-x-0 lg:rounded-xl lg:shadow-lg lg:mt-2">
            <button id="closeMenu"
                    class="absolute top-3 right-3 text-3xl leading-none bg-transparent text-white hover:text-slate-200 lg:hidden">
                ×
            </button>
            <div class="px-5 pt-6 pb-4 border-b border-indigo-500/40">
                <h2 class="text-lg font-semibold tracking-wide">Taskflow</h2>
                <p class="text-xs text-indigo-100/80">Organiza tareas, calendario y notas</p>
            </div>
            <ul class="mt-2 space-y-1 px-2 py-4 text-sm font-medium sidebar-menu">
                <li>
                    <a href="#"
                       onclick="showSection('taskSection')"
                       class="block rounded-lg px-3 py-2 hover:bg-indigo-500/60 transition-colors">
                        📝 Tareas
                    </a>
                </li>
                <li>
                    <a href="#"
                       onclick="showSection('calendarSection')"
                       class="block rounded-lg px-3 py-2 hover:bg-indigo-500/60 transition-colors">
                        📅 Calendario
                    </a>
                </li>
                <li>
                    <a href="#"
                       onclick="showSection('notesSection')"
                       class="block rounded-lg px-3 py-2 hover:bg-indigo-500/60 transition-colors">
                        🗒️ Notas
                    </a>
                </li>
                <li>
                    <a href="#"
                       class="block rounded-lg px-3 py-2 hover:bg-indigo-500/60 transition-colors">
                        ⚙️ Configuración
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main content column: header + main sections -->
        <div class="flex-1 space-y-4">
            <!-- Header bar: title + dark mode toggle -->
            <header class="bg-amber-900 text-yellow-300 border-2 border-black rounded-xl shadow-lg px-6 py-4">
                <div class="flex items-center justify-between gap-4 header-content">
                    <h1 class="text-xl sm:text-2xl font-extrabold tracking-wide uppercase">
                        Taskflow ORKSHOP Project
                    </h1>
                    <button id="darkModeToggle"
                            class="dark-mode-toggle text-2xl sm:text-3xl hover:rotate-12 transition-transform">
                        🌙
                    </button>
                </div>
            </header>

            <!-- Main application sections: tasks, calendar, notes -->
            <main class="space-y-6">
                <!-- Priority filter bar above tasks -->
                <section id="taskFilterSection"
                         class="flex flex-wrap items-center gap-3 bg-white/80 dark:bg-slate-800/80 rounded-xl shadow px-4 py-3">
                    <label for="taskFilter" class="text-sm font-semibold">Filtrar por prioridad:</label>
                    <select id="taskFilter"
                            class="text-sm rounded-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-3 py-1.5">
                        <option value="all">Todas</option>
                        <option value="Alta">Alta</option>
                        <option value="Media">Media</option>
                        <option value="Baja">Baja</option>
                    </select>
                </section>

                <!-- Task section (default visible) -->
                <section id="taskSection">
                    <!-- Card containing the tasks app (form + list) -->
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg px-5 py-4">
                        <h2 class="text-lg font-semibold mb-3">Mis tareas</h2>

                        <!-- Task form wired to Script2.js -->
                        <form id="taskForm" class="task-form flex flex-wrap gap-3 mb-4">
                            <input type="text"
                                   id="newTaskTitle"
                                   placeholder="Nueva tarea"
                                   required
                                   class="flex-1 min-w-[180px] rounded-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-3 py-2 text-sm" />

                            <select id="newTaskCategory"
                                    class="min-w-[140px] rounded-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-3 py-2 text-sm">
                                <option value="Trabajo">Trabajo</option>
                                <option value="Formación">Formación</option>
                                <option value="Equipo">Equipo</option>
                                <option value="Personal">Personal</option>
                            </select>

                            <select id="newTaskPriority"
                                    class="min-w-[120px] rounded-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-3 py-2 text-sm">
                                <option value="Alta">Alta</option>
                                <option value="Media">Media</option>
                                <option value="Baja">Baja</option>
                            </select>

                            <button type="submit"
                                    class="inline-flex items-center justify-center rounded-md bg-indigo-600 text-white text-sm font-semibold px-4 py-2 hover:bg-indigo-700 transition-colors">
                                Añadir tarea
                            </button>
                        </form>

                        <!-- Task list populated by Script2.js -->
                        <ul id="taskList" class="task-list space-y-2"></ul>
                    </div>
                </section>

                <!-- Calendar section (hidden until selected from sidebar) -->
                <section id="calendarSection" style="display:none;">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg px-5 py-4">
                        <h2 class="text-lg font-semibold mb-3">Calendario</h2>
                        <div id="calendar" class="min-h-[200px] border border-dashed border-slate-300 dark:border-slate-600 rounded-lg"></div>
                    </div>
                </section>

                <!-- Notes section (hidden until selected from sidebar) -->
                <section id="notesSection" style="display:none;">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg px-5 py-4">
                        <h2 class="text-lg font-semibold mb-3">Mis Notas</h2>
                        <textarea id="notes"
                                  placeholder="Escribe tus notas aquí..."
                                  class="w-full h-52 rounded-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-3 py-2 text-sm resize-none"></textarea>
                    </div>
                </section>
            </main>
        </div>

        <!-- Right-side filters/search panel -->
        <div class="hidden lg:block w-72 space-y-4">
            <!-- Search box for tasks -->
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow px-4 py-3">
                <h3 class="text-sm font-semibold mb-2">Búsqueda</h3>
                <label for="searchInput" class="sr-only">Buscar tarea</label>
                <input type="text"
                       id="searchInput"
                       placeholder="Escribe para buscar..."
                       class="w-full rounded-md border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-3 py-2 text-sm" />
            </div>

            <!-- Category filters -->
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow px-4 py-3">
                <h3 class="text-sm font-semibold mb-2">Categorías</h3>
                <ul id="categoryFilters" class="category-filters space-y-2 text-sm">
                    <li>
                        <button class="filter-btn active w-full text-left rounded-md border border-slate-300 dark:border-slate-600 px-3 py-2 hover:bg-slate-100 dark:hover:bg-slate-700">
                            Todas
                        </button>
                    </li>
                    <li>
                        <button class="filter-btn w-full text-left rounded-md border border-slate-300 dark:border-slate-600 px-3 py-2 hover:bg-slate-100 dark:hover:bg-slate-700"
                                data-category="Trabajo">
                            Trabajo
                        </button>
                    </li>
                    <li>
                        <button class="filter-btn w-full text-left rounded-md border border-slate-300 dark:border-slate-600 px-3 py-2 hover:bg-slate-100 dark:hover:bg-slate-700"
                                data-category="Formación">
                            Formación
                        </button>
                    </li>
                    <li>
                        <button class="filter-btn w-full text-left rounded-md border border-slate-300 dark:border-slate-600 px-3 py-2 hover:bg-slate-100 dark:hover:bg-slate-700"
                                data-category="Equipo">
                            Equipo
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <script src="Script2.js"></script>

    <!-- Footer with small app credits -->
    <footer class="mt-4 pb-4 text-center text-xs text-slate-500 dark:text-slate-400">
        <p>&copy; Marzo 2026 Mi AppOrk. Todos los derechos reservados (ork C)</p>
    </footer>
</body>
</html>
